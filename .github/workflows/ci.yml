name: RecipeBook Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout monorepo codebase
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-level: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Validate database schema (Prisma generate)
      run: npm run prisma:generate

    - name: Compile Fastify backend API
      run: npm run build:api

    - name: Compile Next.js Web Application
      run: npm run build:web

    - name: Compile Next.js Admin Panel
      run: npm run build:admin
