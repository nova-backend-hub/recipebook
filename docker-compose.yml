version: '3.8'

services:
  # 1. PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: recipebook_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: recipebook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis Caching Service
  redis:
    image: redis:7-alpine
    container_name: recipebook_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Fastify TypeScript Core API Service
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: recipebook_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword123@postgres:5432/recipebook?schema=public
      - JWT_SECRET=recipebook-jwt-super-secret-key-12345
      - JWT_REFRESH_SECRET=recipebook-jwt-refresh-super-secret-key-54321
      - ADMIN_USERNAME=Soli
      - ADMIN_PASSWORD=Soliman@1234
    depends_on:
      - postgres
      - redis

  # 4. Next.js Public Web Application
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: recipebook_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

  # 5. Next.js Protected Command Dashboard
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: recipebook_admin
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  postgres_data:
